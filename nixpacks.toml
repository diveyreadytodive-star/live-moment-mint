[phases.setup]
nixPkgs = ["nodejs_20", "pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @momento/shared build",
  "pnpm --filter @momento/image build",
  "pnpm --filter @momento/txline build",
  "DATABASE_URL=$DATABASE_URL pnpm exec prisma generate",
  "DATABASE_URL=$DATABASE_URL pnpm exec prisma migrate deploy",
  "pnpm --filter keeper build"
]

[start]
cmd = "pnpm --filter keeper start"
